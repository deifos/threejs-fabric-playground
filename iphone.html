<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone Mockup Playground</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #a8c1dc;
        --mist: rgba(255, 255, 255, 0.68);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background: #0c0e14;
        color: #f6f8fa;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      #three-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      /* Top-left toggle to switch between mockups */
      .mockup-toggle {
        position: fixed;
        top: 24px;
        left: 24px;
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(19, 23, 28, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .mockup-toggle a {
        padding: 8px 18px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--mist);
        text-decoration: none;
        border-radius: 999px;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .mockup-toggle a:hover {
        color: #ffffff;
      }

      .mockup-toggle a.active {
        background: var(--accent);
        color: #0c0e14;
      }

      /* Color swatch picker (bottom center) */
      .color-picker {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        background: rgba(19, 23, 28, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .color-picker .label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .swatch {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.18);
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease;
        padding: 0;
      }

      .swatch:hover {
        transform: scale(1.1);
      }

      .swatch.active {
        border-color: #ffffff;
        transform: scale(1.15);
        box-shadow: 0 0 0 3px rgba(168, 193, 220, 0.3);
      }

      /* Depth-of-field side panel */
      .dof-panel {
        position: fixed;
        top: 32px;
        right: 32px;
        width: 260px;
        padding: 18px;
        background: rgba(19, 23, 28, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        z-index: 10;
        user-select: none;
        box-sizing: border-box;
      }

      .dof-panel .title {
        display: block;
        margin-bottom: 10px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .dof-tabs {
        display: flex;
        gap: 2px;
        padding: 2px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        margin-bottom: 14px;
      }

      .dof-tab {
        flex: 1;
        padding: 8px 0;
        font-size: 11px;
        font-weight: 600;
        color: var(--mist);
        background: transparent;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .dof-tab:hover { color: #ffffff; }

      .dof-tab.active {
        background: var(--accent);
        color: #0c0e14;
      }

      .dof-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        font-size: 11px;
        color: var(--mist);
      }

      .dof-row label {
        flex-shrink: 0;
        width: 42px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .dof-row input[type="range"] {
        flex: 1 1 0;
        min-width: 0;
        accent-color: var(--accent);
      }

      .dof-row .value {
        flex-shrink: 0;
        font-size: 10px;
        min-width: 36px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .dof-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 8;
      }
    </style>
  </head>
  <body>
    <canvas id="three-canvas"></canvas>

    <nav class="mockup-toggle">
      <a href="/index.html">Laptop</a>
      <a href="/iphone.html" class="active">iPhone</a>
    </nav>

    <div class="color-picker">
      <span class="label">Color</span>
      <button class="swatch" data-color="blue"  style="background:#b8d4e6" title="Sky Blue"></button>
      <button class="swatch" data-color="black" style="background:#2a2d33" title="Black"></button>
      <button class="swatch" data-color="white" style="background:#eef0f2" title="White"></button>
      <button class="swatch" data-color="pink"  style="background:#f3d6d4" title="Pink"></button>
    </div>

    <aside class="dof-panel">
      <span class="title">Depth of Field</span>
      <div class="dof-tabs">
        <button class="dof-tab active" data-mode="none">Off</button>
        <button class="dof-tab" data-mode="radial">Radial</button>
        <button class="dof-tab" data-mode="directional">Linear</button>
      </div>
      <div class="dof-row">
        <label for="dof-amount">Blur</label>
        <input type="range" id="dof-amount" min="0" max="20" value="6" />
        <span class="value" id="dof-amount-label">6px</span>
      </div>
      <div class="dof-row">
        <label for="dof-position">Focus</label>
        <input type="range" id="dof-position" min="0" max="100" value="50" />
        <span class="value" id="dof-position-label">50%</span>
      </div>
      <div class="dof-row" data-row="angle" style="display:none">
        <label for="dof-angle">Angle</label>
        <input type="range" id="dof-angle" min="0" max="360" value="180" />
        <span class="value" id="dof-angle-label">180°</span>
      </div>
    </aside>

    <script type="module" src="/src/iphone.js"></script>
    <script type="module" src="/src/dof.js"></script>
  </body>
</html>
