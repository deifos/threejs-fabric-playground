<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iPhone Mockup Playground</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #a8c1dc;
        --mist: rgba(255, 255, 255, 0.68);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background: #0c0e14;
        color: #f6f8fa;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      #three-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      /* Top-left toggle to switch between mockups */
      .mockup-toggle {
        position: fixed;
        top: 24px;
        left: 24px;
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(19, 23, 28, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .mockup-toggle a {
        padding: 8px 18px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--mist);
        text-decoration: none;
        border-radius: 999px;
        transition: background 0.15s ease, color 0.15s ease;
      }

      .mockup-toggle a:hover {
        color: #ffffff;
      }

      .mockup-toggle a.active {
        background: var(--accent);
        color: #0c0e14;
      }

      /* Color swatch picker (bottom center) */
      .color-picker {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 22px;
        background: rgba(19, 23, 28, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      .color-picker .label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .swatch {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.18);
        cursor: pointer;
        transition: transform 0.15s ease, border-color 0.15s ease;
        padding: 0;
      }

      .swatch:hover {
        transform: scale(1.1);
      }

      .swatch.active {
        border-color: #ffffff;
        transform: scale(1.15);
        box-shadow: 0 0 0 3px rgba(168, 193, 220, 0.3);
      }
    </style>
  </head>
  <body>
    <canvas id="three-canvas"></canvas>

    <nav class="mockup-toggle">
      <a href="/index.html">Laptop</a>
      <a href="/iphone.html" class="active">iPhone</a>
    </nav>

    <div class="color-picker">
      <span class="label">Color</span>
      <button class="swatch" data-color="blue"  style="background:#b8d4e6" title="Sky Blue"></button>
      <button class="swatch" data-color="black" style="background:#2a2d33" title="Black"></button>
      <button class="swatch" data-color="white" style="background:#eef0f2" title="White"></button>
      <button class="swatch" data-color="pink"  style="background:#f3d6d4" title="Pink"></button>
    </div>

    <script type="module" src="/src/iphone.js"></script>
  </body>
</html>
